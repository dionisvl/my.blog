services:
  traefik:
    image: traefik:v3.6.7
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.metrics.address=:8082"
      - "--tracing.otlp=true"
      - "--tracing.otlp.http=true"
      - "--tracing.otlp.http.endpoint=http://jaeger:4318/v1/traces"
      - "--tracing.serviceName=traefik"
      - "--tracing.addInternals=true"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entryPoint=metrics"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addRoutersLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
      - "--metrics.prometheus.buckets=0.1,0.3,1.2,5.0"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--accesslog.format=json"
    ports:
      - "80:80"
    expose:
      - "8082"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/var/log/traefik:/var/log/traefik"
    networks:
      - app-network

  symfony:
    build:
      context: ./api-symfony
      dockerfile: ./Dockerfile
      target: dev
    env_file:
      - path: ./.env
        required: true
    environment:
      PHP_IDE_CONFIG: serverName=${SERVER_NAME}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?serverVersion=17&charset=utf8"
      SERVER_NAME: ":80"
      MAX_REQUESTS: "500"
      GOMEMLIMIT: "512MiB"
    expose:
      - "80"
      - "443"
      - "443/udp"
    volumes:
      - ./api-symfony:/app:rw
      - ./api-symfony/public/storage:/app/public/storage:rw
      - ./api-symfony/Caddyfile:/etc/caddy/Caddyfile:ro
    command: sh -c "php bin/console cache:warmup --no-interaction && frankenphp run --config /etc/caddy/Caddyfile"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.symfony.rule=Host(`blog.test`)"
      - "traefik.http.services.symfony.loadbalancer.server.port=80"
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - postgres
      - victoria-logs
    healthcheck:
      test: [ "CMD-SHELL", "php -r 'exit(file_get_contents(\"http://127.0.0.1/health\") === \"OK\" ? 0 : 1);'" ]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pets-app:
    build:
      context: ./.docker/php-simple
      dockerfile: ./Dockerfile
    env_file:
      - path: ./.env
        required: true
    networks:
      - app-network

  postgres:
    image: postgres:17.9-alpine
    env_file:
      - path: ./.env
        required: true
      - path: ./.env.local
        required: false
    ports:
      - "${DB_PORT_EXTERNAL}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  victoria-logs:
    image: victoriametrics/victoria-logs:v1.44.0
    expose:
      - "9428"
    volumes:
      - victoria_logs_data:/victoria-logs-data
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=30d
    networks:
      - app-network
    restart: unless-stopped

  vector:
    image: timberio/vector:nightly-2026-01-30-alpine
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./.devops/vmetrics/vector.toml:/etc/vector/vector.toml:ro
    environment:
      VICTORIA_LOGS_HOST: victoria-logs
      VICTORIA_LOGS_PORT: "9428"
    command: -c /etc/vector/vector.toml
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - victoria-logs
    labels:
      - "traefik.enable=false"

  vmauth:
    image: victoriametrics/vmauth:v1.134.0
    expose:
      - "8427"
    volumes:
      - ./.devops/vmetrics/vmauth-entrypoint.sh:/entrypoint.sh:ro
    environment:
      VMAUTH_ADMIN_USER: ${VMAUTH_ADMIN_USER}
      VMAUTH_ADMIN_PASS: ${VMAUTH_ADMIN_PASS}
      VMAUTH_READONLY_USER: ${VMAUTH_READONLY_USER}
      VMAUTH_READONLY_PASS: ${VMAUTH_READONLY_PASS}
    entrypoint: sh /entrypoint.sh
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - victoria-logs

  jaeger:
    image: jaegertracing/jaeger:2.15.0
    command:
      - "--set=receivers.otlp.protocols.grpc.endpoint=0.0.0.0:4317"
      - "--set=receivers.otlp.protocols.http.endpoint=0.0.0.0:4318"
    expose:
      - "4317"   # OTLP gRPC receiver
      - "4318"   # OTLP HTTP receiver
      - "16686"  # Query UI (web interface)
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  victoria_logs_data:
